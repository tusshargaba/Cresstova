<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="rwGold1" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFFBF0"/><stop offset="40%" stop-color="#E8C97A"/><stop offset="100%" stop-color="#8A6A2A"/>
  </linearGradient>
  <linearGradient id="rwGold2" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#FFFBF0"/><stop offset="100%" stop-color="#C9A84C"/>
  </linearGradient>
  <linearGradient id="rTextGold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#8A6A2A"/><stop offset="50%" stop-color="#FFFBF0"/><stop offset="100%" stop-color="#8A6A2A"/>
  </linearGradient>
  <radialGradient id="rCenterGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#F5E6C0"/>
  </radialGradient>
  <path id="arcPath" d="M 130 600 A 470 470 0 0 1 1070 600" fill="none"/>
  <linearGradient id="planeGold" x1="0%" y1="50%" x2="100%" y2="50%">
    <stop offset="0%" stop-color="#7A5A1A"/>
    <stop offset="50%" stop-color="#F5E6C0"/>
    <stop offset="100%" stop-color="#C9A84C"/>
  </linearGradient>
  <linearGradient id="trailGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
    <stop offset="70%" stop-color="#C9A84C" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.55"/>
  </linearGradient>
</defs>

<!-- Outer decorative rings -->
<circle cx="600" cy="600" r="560" fill="none" stroke="#C9A84C" stroke-width="3" opacity="0.45"/>
<circle cx="600" cy="600" r="540" fill="none" stroke="#C9A84C" stroke-width="1.5" opacity="0.22"/>
<circle cx="600" cy="600" r="490" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.18"/>

<!-- Arc text bottom -->
<text font-family="Georgia, serif" font-size="26" letter-spacing="9" fill="#C9A84C" opacity="0.55" text-anchor="middle">
  <textPath href="#arcPath" startOffset="50%">• EST. MMXXV • GLOBAL • PREMIUM •</textPath>
</text>

<!-- Emblem -->
<g transform="translate(600,440)">
  <circle cx="0" cy="0" r="148" stroke="#C9A84C" stroke-width="2" fill="none" opacity="0.45"/>
  <circle cx="0" cy="0" r="128" stroke="#B8CAFF" stroke-width="1.5" fill="none" opacity="0.3" stroke-dasharray="8 14"/>
  <path d="M0,0 C-36,-22 -68,-38 -136,-38 C-118,-15 -94,0 -36,0 Z" fill="url(#rwGold1)" opacity="0.92"/>
  <path d="M0,0 C-27,-19 -82,-46 -120,-46 C-102,-27 -65,-9 -42,0 Z" fill="url(#rwGold1)" opacity="0.55"/>
  <path d="M0,0 C36,-22 68,-38 136,-38 C118,-15 94,0 36,0 Z" fill="url(#rwGold2)" opacity="0.92"/>
  <path d="M0,0 C27,-19 82,-46 120,-46 C102,-27 65,-9 42,0 Z" fill="url(#rwGold2)" opacity="0.55"/>
  <ellipse cx="0" cy="0" rx="22" ry="41" fill="url(#rwGold1)"/>
  <path d="M-11,-36 L0,-78 L11,-36 Z" fill="url(#rwGold1)"/>
  <path d="M-5,-36 L0,-78 L5,-36 Z" fill="#FFFFFF"/>
  <path d="M-11,36 L0,72 L11,36 Z" fill="url(#rwGold1)" opacity="0.75"/>
  <circle cx="0" cy="0" r="16" fill="url(#rCenterGlow)"/>
  <circle cx="0" cy="0" r="8" fill="#FFFFFF"/>
  <path d="M0,-148 L10,-128 L0,-108 L-10,-128 Z" fill="#C9A84C"/>
  <path d="M0,148 L10,128 L0,108 L-10,128 Z" fill="#C9A84C"/>
  <path d="M-148,0 L-128,10 L-108,0 L-128,-10 Z" fill="#C9A84C"/>
  <path d="M148,0 L128,10 L108,0 L128,-10 Z" fill="#C9A84C"/>
</g>

<!-- Wordmark -->
<text x="600" y="730" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-weight="700"
      font-size="74" letter-spacing="9" fill="url(#rTextGold)" text-anchor="middle">CRESSTOVA</text>

<line x1="430" y1="775" x2="540" y2="775" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>
<path d="M600,775 L610,766 L620,775 L610,784 Z" fill="#C9A84C"/>
<line x1="660" y1="775" x2="770" y2="775" stroke="#C9A84C" stroke-width="1.5" opacity="0.6"/>

<text x="600" y="815" font-family="Georgia, serif" font-size="20" letter-spacing="7"
      fill="#8AAAE8" text-anchor="middle">ELEVATE EVERY JOURNEY</text>

<!-- ═══════════ FLYING PLANE (beside emblem) ═══════════ -->
<line x1="760" y1="430" x2="895" y2="430" stroke="url(#trailGrad)" stroke-width="2.2"/>
<g transform="translate(910,430) rotate(-7) scale(2.0)">
  <g transform="translate(-25,-15)">
    <path d="M2 16 C9 14 32 9 48 15 C44 17 9 19 2 16 Z" fill="url(#planeGold)"/>
    <path d="M16 15 L10 5  L26 13 Z" fill="url(#planeGold)" opacity="0.92"/>
    <path d="M16 17 L10 27 L26 19 Z" fill="url(#planeGold)" opacity="0.72"/>
    <path d="M5 15 L2 9  L12 14 Z" fill="url(#planeGold)" opacity="0.85"/>
    <ellipse cx="42" cy="15" rx="4" ry="2.5" fill="#FFFBF0" opacity="0.55"/>
  </g>
</g>

</svg>
